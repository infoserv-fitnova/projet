version: '3.8'

services:
  # Base de données PostgreSQL pour Zabbix
  zabbix-postgresql:
    image: postgres:15
    container_name: zabbix-postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=ZabbixPass123!
      - POSTGRES_DB=zabbix
      - TZ=Europe/Paris
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - zabbix-network

  # Serveur Zabbix
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    restart: unless-stopped
    ports:
      - "10051:10051"
    environment:
      - DB_SERVER_HOST=zabbix-postgresql
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=ZabbixPass123!
      - POSTGRES_DB=zabbix
      - ZBX_JAVAGATEWAY=zabbix-java-gateway
      - ZBX_TIMEOUT=30
      - TZ=Europe/Paris
    depends_on:
      - zabbix-postgresql
      - zabbix-java-gateway
    networks:
      - zabbix-network

  # Java Gateway (pour surveillance Tomcat/JMX)
  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:alpine-7.0-latest
    container_name: zabbix-java-gateway
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
    networks:
      - zabbix-network

  # Interface Web Zabbix (Nginx + PHP)
  zabbix-web-nginx:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - DB_SERVER_HOST=zabbix-postgresql
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=ZabbixPass123!
      - POSTGRES_DB=zabbix
      - ZBX_SERVER_HOST=zabbix-server
      - PHP_TZ=Europe/Paris
      - ZBX_SERVER_NAME=FITNOVA Zabbix
    depends_on:
      - zabbix-server
      - zabbix-postgresql
    networks:
      - zabbix-network

  # Agent Zabbix (pour surveiller l'hôte Docker lui-même)
  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: zabbix-agent
    restart: unless-stopped
    ports:
      - "10050:10050"
    environment:
      - ZBX_HOSTNAME=zabbix-agent
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_SERVER_PORT=10051
      - TZ=Europe/Paris
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - zabbix-network

networks:
  zabbix-network:
    driver: bridge